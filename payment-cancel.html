<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 취소 | 2GOSOO AI LAB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="subpage" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center;">
    <div class="container">
        <div class="glass-card reveal" style="padding: 4rem; border-radius: 40px; border: 2px solid #ef4444;">
            <div style="background: #fef2f2; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: #ef4444;">
                <i data-lucide="x-circle" style="width: 48px; height: 48px;"></i>
            </div>
            <h1 class="text-gradient" style="font-size: 3rem; margin-bottom: 1rem;">Payment Cancelled</h1>
            <p style="font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2rem;">
                결제가 중단되었습니다. <br>
                추가적인 도움이 필요하시면 상담원에게 말씀해 주세요.
            </p>
            <div style="display: grid; gap: 1rem; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-primary" onclick="location.href='index.html#pricing'">가격 확인하기</button>
                <button class="btn btn-outline" onclick="location.href='contact.html'">상담 문의</button>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
